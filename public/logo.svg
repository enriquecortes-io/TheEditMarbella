<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect width="800" height="320" fill="none"/>

  <!-- The Edit — Cormorant alto contraste -->
  <text x="400" y="185"
    font-family="'Cormorant Garamond','Cormorant','Didot','Playfair Display',Georgia,serif"
    font-size="160"
    font-weight="600"
    fill="white"
    text-anchor="middle"
    letter-spacing="4">The Edit</text>

  <!-- Línea separadora -->
  <line x1="60" y1="210" x2="740" y2="210"
    stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>

  <!-- Marbella — Montserrat ligera espaciada -->
  <text x="400" y="268"
    font-family="'Montserrat','Helvetica Neue',Arial,sans-serif"
    font-size="38"
    font-weight="200"
    fill="rgba(255,255,255,0.8)"
    text-anchor="middle"
    letter-spacing="22">Marbella</text>
</svg>
