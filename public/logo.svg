<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@200;300&display=swap');
    </style>
  </defs>

  <!-- Fondo transparente -->
  <rect width="800" height="300" fill="none"/>

  <!-- THE EDIT -->
  <text x="400" y="170"
    font-family="'Cormorant Garamond', 'Didot', 'Playfair Display', Georgia, serif"
    font-size="140"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="8">The Edit</text>

  <!-- Línea separadora -->
  <line x1="80" y1="195" x2="720" y2="195"
    stroke="white" stroke-width="0.8" opacity="0.6"/>

  <!-- MARBELLA -->
  <text x="400" y="250"
    font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
    font-size="42"
    font-weight="200"
    fill="white"
    text-anchor="middle"
    letter-spacing="18"
    opacity="0.85">Marbella</text>
</svg>
